   <section class="hero">

            <h1>Contact Us</h1>

 <section class="contact-section">
<h2>Contact Us</h2>
<form id="contactForm">
     <label for="name">Name</label>
    <br>
    <input type="text" id="name" placeholder="Enter your name"  name="name"><br><br>
     <label for="email">Email</label>
    <br>
    <input type="email" id="email" placeholder="Enter your email"  name="email"><br><br>
      <label for="message">Message</label>
    <br>
    <textarea id="message" placeholder="Your Message Here" name="message"></textarea><br><br>
    <button type="submit" class="">Send</button>
</form>

<p id="result"></p>
</section>
