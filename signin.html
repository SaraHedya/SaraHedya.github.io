<html>
<head>
    <title>Sign In Page- SoftWare Engineering Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
    <nav class="navbar">
        <div class="logo">SoftWare Engineering Store</div>
        <ul class="nav-links">
           
           
           
            
           <li class="cart">
            <a href="#" onclick="toggleOrders(); return false;">        
                <img src="cart-icon.png" alt="Cart" class="cart-icon"> 
                <span class="cart-badge" id="cartCount">0</span>
            </a>          
          </li>
           
           
         
        </ul>
    </nav>
       <section class="hero">
        <div class="hero-text">
            <h1>Sign in</h1>
            <p>Welcome to our store! Please sign in.</p>
        </div>

        <div class="hero-image">
            <img src="signin.png" alt="Sign in">
        </div>
    </section>
    

 <section class="signin-section">
<h2>Sign In</h2>
<form id="signinForm">
    <input type="text" id="username" placeholder="Username"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>
    <button type="submit" class="">Sign In</button>
    <a href="#">Forgot Password?</a>
        
        <br>        <br>

<input type="button" value="Sign Up" class="up" onclick="signUp()"></button>

        <br>        <br>


<p id="result"></p>
</form>


</section>


<script src="signin.js"></script>

</body>
</html>
